<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ग्रामीण न्याय (Gramin-Nyaya)</title>
    <style>
        /* Modern, Village-Friendly Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        header {
            background-color: #065f46; /* Emerald Green */
            color: white;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container {
            width: 90%;
            max-width: 700px;
            background: white;
            margin-top: -30px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 2.5rem; }
        p.subtitle { margin-top: 10px; font-weight: 500; opacity: 0.9; }

        label { display: block; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #065f46; }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1.1rem;
            box-sizing: border-box;
            resize: none;
            outline: none;
        }

        textarea:focus { border-color: #065f46; }

        button {
            width: 100%;
            background-color: #f97316; /* Orange */
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.1s, background 0.3s;
        }

        button:hover { background-color: #ea580c; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #resultBox {
            margin-top: 30px;
            padding: 20px;
            background-color: #ecfdf5;
            border-left: 6px solid #10b981;
            border-radius: 8px;
            display: none; /* Hidden until answer arrives */
        }

        #resultBox h2 { margin-top: 0; color: #064e3b; font-size: 1.3rem; }
        #answerText { line-height: 1.6; font-size: 1.1rem; }

        footer { margin-top: 40px; color: #888; font-size: 0.9rem; text-align: center; padding-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>ग्रामीण न्याय</h1>
        <p class="subtitle">पंजीकरण अधिनियम 1908: डिजिटल कानूनी सहायक</p>
    </header>

    <div class="container">
        <label for="question">अपना सवाल यहाँ लिखें:</label>
        <textarea id="question" placeholder="जैसे: रजिस्ट्री के लिए क्या दस्तावेज चाहिए?"></textarea>
        
        <button id="askBtn" onclick="askQuestion()">जवाब प्राप्त करें</button>

        <div id="resultBox">
            <h2>⚖️ कानूनी परामर्श:</h2>
            <p id="answerText"></p>
        </div>
    </div>

    <footer>
        <p><strong>DEI इंजीनियरिंग प्रोजेक्ट</strong></p>
        <p>Offline RAG System | powered by Ollama</p>
    </footer>

    <script>
        async function askQuestion() {
            const question = document.getElementById('question').value;
            const btn = document.getElementById('askBtn');
            const resultBox = document.getElementById('resultBox');
            const answerText = document.getElementById('answerText');

            if (!question.trim()) return;

            // UI Feedback
            btn.disabled = true;
            btn.innerText = "खोज रहा हूँ...";
            resultBox.style.display = "none";

            try {
                const response = await fetch("http://localhost:8000/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                
                answerText.innerText = data.answer;
                resultBox.style.display = "block";
            } catch (error) {
                alert("सर्वर से जुड़ने में समस्या आ रही है। सुनिश्चित करें कि 'api.py' चालू है।");
            } finally {
                btn.disabled = false;
                btn.innerText = "जवाब प्राप्त करें";
            }
        }
    </script>
</body>
</html>
